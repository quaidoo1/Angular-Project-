<div class="page">
  <header class="page-header">
    <div class="header-inner">
      <div>
        <h1 class="page-title">Shoes</h1>
        <p class="page-subtitle">{{ shoes.length }} items in store</p>
      </div>
      <button class="btn btn-primary" (click)="addShoe()">+ Add Shoe</button>
    </div>
  </header>

  <div class="content">
    <div *ngIf="loading" class="state-msg">Loading...</div>
    <div *ngIf="error" class="state-msg error">{{ error }}</div>

    <div *ngIf="!loading && !error" class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let shoe of shoes">
            <td class="id-cell">{{ shoe.id }}</td>
            <td class="name-cell">{{ shoe.name }}</td>
            <td>{{ shoe.brand }}</td>
            <td class="price-cell">\${{ shoe.price | number:'1.2-2' }}</td>
            <td class="actions-cell">
              <button class="btn btn-sm btn-edit" (click)="editShoe(shoe.id)">Edit</button>
              <button class="btn btn-sm btn-delete" (click)="deleteShoe(shoe.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>

      <div *ngIf="shoes.length === 0" class="empty-msg">No shoes found. Add one to get started.</div>
    </div>
  </div>
</div>
