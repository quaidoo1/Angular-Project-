<div class="page">
  <header class="page-header">
    <div class="header-inner">
      <h1 class="page-title">Delete Shoe</h1>
      <p class="page-subtitle">This action cannot be undone</p>
    </div>
  </header>

  <div class="content">
    <div *ngIf="loading" class="state-msg">Loading...</div>
    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div *ngIf="!loading && shoe" class="confirm-card">
      <div class="warning-icon">!</div>
      <p class="confirm-text">
        Are you sure you want to delete <strong>{{ shoe.name }}</strong> by {{ shoe.brand }}?
      </p>
      <div class="shoe-details">
        <div class="detail-row"><span class="detail-label">ID</span><span>{{ shoe.id }}</span></div>
        <div class="detail-row"><span class="detail-label">Name</span><span>{{ shoe.name }}</span></div>
        <div class="detail-row"><span class="detail-label">Brand</span><span>{{ shoe.brand }}</span></div>
        <div class="detail-row"><span class="detail-label">Price</span><span>\${{ shoe.price | number:'1.2-2' }}</span></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
        <button class="btn btn-danger" (click)="confirm()" [disabled]="deleting">
          {{ deleting ? 'Deleting...' : 'Yes, Delete' }}
        </button>
      </div>
    </div>
  </div>
</div>
