<div class="page">
  <header class="page-header">
    <div class="header-inner">
      <div>
        <h1 class="page-title">{{ isEdit ? 'Edit Shoe' : 'Add Shoe' }}</h1>
        <p class="page-subtitle">{{ isEdit ? 'Update the details below' : 'Fill in the details below' }}</p>
      </div>
    </div>
  </header>

  <div class="content">
    <div *ngIf="loading" class="state-msg">Loading...</div>
    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div *ngIf="!loading" class="form-card">
      <div class="form-group">
        <label class="label" for="name">Name</label>
        <input
          id="name"
          class="input"
          type="text"
          [(ngModel)]="shoe.name"
          placeholder="e.g. Air Max 90"
        />
      </div>

      <div class="form-group">
        <label class="label" for="brand">Brand</label>
        <input
          id="brand"
          class="input"
          type="text"
          [(ngModel)]="shoe.brand"
          placeholder="e.g. Nike"
        />
      </div>

      <div class="form-group">
        <label class="label" for="price">Price ($)</label>
        <input
          id="price"
          class="input"
          type="number"
          [(ngModel)]="shoe.price"
          placeholder="0.00"
          min="0"
          step="0.01"
        />
      </div>

      <div class="form-actions">
        <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
        <button class="btn btn-primary" (click)="save()" [disabled]="saving">
          {{ saving ? 'Saving...' : (isEdit ? 'Update Shoe' : 'Add Shoe') }}
        </button>
      </div>
    </div>
  </div>
</div>
